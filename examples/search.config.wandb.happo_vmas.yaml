program: examples/wandb_sweep_wrapper_multi_seed.py
project: DeeperDiveIntoMACA
method: random
metric:
  name: eval_episode_rewards_mean
  goal: maximize

parameters:
  # MACA entrypoint selection
  algo:
    value: happo
  config:
    value: happo
  env-config:
    value: "gymma"

  # Environment/task
  env_args.key:
    value: "vmas-balance"
  env_args.time_limit:
    value: 150
  env_args.n_agents:
    value: 5

  # Run naming and budget
  name:
    value: happo_vmas
  t_max:
    value: 1050000

  # Tuned hyperparameters (same set as mappo_t sweep templates)
  hidden_dim:
    values: [64, 128]
  lr:
    distribution: uniform
    max: 0.001
    min: 0.0001
  use_rnn:
    values: [True, False]
  entropy_coef:
    distribution: uniform
    max: 0.01
    min: 0.001
  epochs:
    values: [4, 8]
  eps_clip:
    values: [0.05, 0.2]
  algo.gae_lambda:
    values: [0.9, 0.95, 0.99]

  # Kept for DISSC-style compatibility; ignored with explicit wrapper warning.
  save_model:
    value: False

# Note:
# - DISSC keys {standardise_rewards, q_nstep, target_update_interval_or_tau}
#   are intentionally omitted because they do not have MACA on-policy equivalents.
