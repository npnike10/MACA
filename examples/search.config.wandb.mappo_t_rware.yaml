program: examples/wandb_sweep_wrapper_multi_seed.py
project: DeeperDiveIntoMACA
method: random
metric:
  name: eval_episode_rewards_mean
  goal: maximize

parameters:
  # MACA entrypoint selection
  algo:
    value: mappo_t
  config:
    value: mappo_t_rware
  env-config:
    value: "gymma"

  # Environment/task
  env_args.time_limit:
    value: 500
  env_args.key:
    value: "rware:rware-tiny-4ag-v2"

  # Run naming and budget
  name:
    value: mappo_t_rware
  t_max:
    value: 4000000

  # Tuned hyperparameters (DISSCv2-role-aligned mappings)
  hidden_dim:
    values: [64, 128]
  lr:
    distribution: uniform
    max: 0.001
    min: 0.0001
  use_rnn:
    values: [True, False]
  entropy_coef:
    distribution: uniform
    max: 0.01
    min: 0.001

  # Kept for DISSC-style compatibility; ignored with explicit wrapper warning.
  save_model:
    value: False

# Note:
# - DISSC keys {standardise_rewards, q_nstep, target_update_interval_or_tau}
#   are intentionally omitted because they do not have MACA on-policy equivalents.
